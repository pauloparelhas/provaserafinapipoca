<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz: Povos, Culturas e Espaco &mdash; Serafina</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../base.css">
<style>
.q-wrap{max-width:520px;margin:0 auto;}
.q-num{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;text-align:center;}
.q-text{font-size:calc(15px * var(--fs));font-weight:800;color:var(--text);line-height:1.5;margin-bottom:18px;text-align:center;padding:16px 12px;background:rgba(255,255,255,.04);border-radius:16px;border:1px solid rgba(255,255,255,.08);}
.opts{display:flex;flex-direction:column;gap:9px;margin-bottom:16px;}
.opt{padding:13px 16px;border-radius:14px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);cursor:pointer;font-family:inherit;font-size:calc(14px * var(--fs));font-weight:700;color:var(--text);text-align:left;transition:all .18s;min-height:48px;-webkit-tap-highlight-color:transparent;}
.opt:hover{border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.08);transform:translateY(-1px);}
.opt.correct{border-color:#34d399;background:rgba(52,211,153,.12);color:#34d399;cursor:default;}
.opt.wrong{border-color:#ef4444;background:rgba(239,68,68,.1);color:#f87171;cursor:default;}
.opt.disabled{cursor:default;opacity:.55;}
.hint-box{border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:calc(12px * var(--fs));font-weight:700;display:none;}
.hint-box.correct{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--text);display:block;}
.hint-box.wrong{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);color:var(--text);display:block;}
.hint-label{font-weight:900;margin-bottom:3px;}
.hint-label.ok{color:#34d399;}
.hint-label.no{color:#f87171;}
.progress-bar{background:rgba(255,255,255,.07);border-radius:50px;height:6px;margin-bottom:16px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#34d399,#60a5fa);border-radius:50px;transition:width .4s;}
.btn-next{background:linear-gradient(135deg,#34d399,#60a5fa);color:#fff;border:none;font-family:inherit;font-size:15px;font-weight:800;padding:13px 32px;border-radius:50px;cursor:pointer;display:block;margin:0 auto;min-height:44px;transition:all .2s;}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(52,211,153,.3);}
.q-dots{display:flex;gap:5px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;}
.q-dot{width:9px;height:9px;border-radius:50%;background:var(--card-border);}
.q-dot.done{background:#34d399;}
.q-dot.fail{background:#ef4444;}
.q-dot.cur{background:#f59e0b;box-shadow:0 0 7px rgba(245,158,11,.5);}
.end-emoji{font-size:64px;text-align:center;display:block;margin:16px 0;filter:drop-shadow(0 0 16px rgba(52,211,153,.5));}
.end-score{text-align:center;font-size:calc(22px * var(--fs));font-weight:900;color:var(--text);margin-bottom:8px;}
.end-sub{text-align:center;font-size:14px;font-weight:700;color:var(--text-soft);margin-bottom:24px;}
.intro-emoji{font-size:64px;text-align:center;display:block;margin-bottom:14px;filter:drop-shadow(0 0 20px rgba(96,165,250,.5));animation:mfloat 3s ease-in-out infinite;}
.screen{max-width:540px;}
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div id="app">
<div class="navbar">
  <div class="nav-logo" id="navLogo">Serafina</div>
  <div class="nav-right">
    <button class="nav-btn nb-home" id="btnHome" onclick="showHomeModal()">&#x1F3E0;</button>
    <button class="nav-btn" id="btnRestart" onclick="startGame()">&#x21BA;</button>
    <div class="nav-a11y">
      <button class="nav-a11y-btn" id="btnFontDown" onclick="changeFontSize(-1)">A-</button>
      <button class="nav-a11y-btn" id="btnFontUp" onclick="changeFontSize(1)">A+</button>
      <button class="nav-a11y-btn" id="themeBtn" onclick="toggleTheme()">&#x2600;&#xFE0F;</button>
    </div>
  </div>
</div>

<div class="screen active" id="screen-intro">
  <div class="intro-emoji">&#x2753;</div>
  <div class="intro-title">Quiz: Povos, Culturas e Espaco</div>
  <div class="intro-sub">GEO NB2 &bull; 10 perguntas</div>
  <div style="text-align:center;font-size:13px;font-weight:700;color:var(--text-dim);margin:12px 0 24px;">Gerado pelo NotebookLM com base nos insumos da aula</div>
  <button class="btn-start" onclick="startGame()">&#x1F4DA; Come&ccedil;ar!</button>
</div>

<div class="screen" id="screen-game">
  <div class="q-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    <div class="q-dots" id="qDots"></div>
    <div class="q-num" id="qNum">1 / 10</div>
    <div class="q-text" id="qText"></div>
    <div class="opts" id="optsEl"></div>
    <div class="hint-box" id="hintBox">
      <div class="hint-label" id="hintLabel"></div>
      <div id="hintDetail"></div>
    </div>
    <button class="btn-next" id="btnNext" style="display:none" onclick="nextQ()">Pr&oacute;xima &#x27A1;</button>
  </div>
</div>

<div class="screen" id="screen-end">
  <span class="end-emoji" id="endEmoji"></span>
  <div class="end-title" id="endTitle"></div>
  <div class="end-score" id="endScore"></div>
  <div class="end-sub" id="endSub"></div>
  <button class="btn-restart" onclick="startGame()">&#x1F500; Jogar de novo</button>
  <div style="text-align:center;margin-top:14px;">
    <button class="nav-btn" onclick="showHomeModal()" style="margin:0 auto;font-size:13px;padding:10px 20px;">&#x1F3E0; In&iacute;cio</button>
  </div>
</div>
</div>

<script src="../base.js"></script>
<script>
var RAW_QUESTIONS = [{"question": "De acordo com o material, qual \u00e9 a defini\u00e7\u00e3o correta de 'Tradi\u00e7\u00e3o'?", "answerOptions": [{"text": "Conhecimentos e costumes passados de gera\u00e7\u00e3o em gera\u00e7\u00e3o, como dan\u00e7as e rituais.", "isCorrect": true, "rationale": "A tradi\u00e7\u00e3o \u00e9 definida como o aprendizado transmitido por av\u00f3s e pais para os filhos ao longo do tempo."}, {"text": "Um grupo de pessoas que vive no mesmo lugar e tem a mesma hist\u00f3ria.", "isCorrect": false, "rationale": "Esta descri\u00e7\u00e3o refere-se especificamente ao conceito de 'Povo', n\u00e3o ao de 'Tradi\u00e7\u00e3o'."}, {"text": "O conjunto de roupas, comidas e idiomas que um grupo utiliza.", "isCorrect": false, "rationale": "Esses elementos comp\u00f5em o que chamamos de 'Cultura', que \u00e9 o modo de vida geral de um grupo."}, {"text": "A constru\u00e7\u00e3o de mapas e maquetes para representar um lugar.", "isCorrect": false, "rationale": "Isso se refere \u00e0s representa\u00e7\u00f5es de lugares e n\u00e3o aos costumes herdados da fam\u00edlia."}], "hint": "Pense naquilo que \u00e9 ensinado pelos mais velhos aos mais novos dentro de uma fam\u00edlia ou comunidade."}, {"question": "Qual \u00e9 o principal meio de transporte utilizado pelos povos ind\u00edgenas do Brasil que vivem pr\u00f3ximos a rios?", "answerOptions": [{"text": "Canoa", "isCorrect": true, "rationale": "A canoa permite o deslocamento eficiente pelos rios e lagos, fundamentais para a pesca e locomo\u00e7\u00e3o desses povos."}, {"text": "Tren\u00f3", "isCorrect": false, "rationale": "O tren\u00f3 \u00e9 utilizado por povos de regi\u00f5es frias e com neve, como os Nenets, e n\u00e3o nas florestas tropicais."}, {"text": "Carro", "isCorrect": false, "rationale": "Embora existam em cidades, o material destaca a canoa como o transporte tradicional ligado ao modo de vida na floresta."}, {"text": "Caminhada em trilhas", "isCorrect": false, "rationale": "Apesar de caminharem, a canoa \u00e9 apontada como o principal meio de transporte para movimenta\u00e7\u00e3o e pesca."}], "hint": "Considere o ve\u00edculo ideal para se movimentar em rios e lagos dentro da floresta."}, {"question": "Por que o povo Nenets, da R\u00fassia, \u00e9 considerado um povo n\u00f4made?", "answerOptions": [{"text": "Porque eles mudam de lugar seguindo as necessidades de pasto de suas renas.", "isCorrect": true, "rationale": "O nomadismo \u00e9 caracterizado pelo deslocamento constante em busca de recursos, como o alimento para os animais."}, {"text": "Porque vivem em casas fixas feitas de madeira na Sib\u00e9ria.", "isCorrect": false, "rationale": "Os Nenets vivem em tendas chamadas chums, que podem ser montadas e desmontadas para facilitar a mudan\u00e7a."}, {"text": "Porque viajam apenas para pescar durante o dia e voltam para o mesmo lugar.", "isCorrect": false, "rationale": "O deslocamento dos Nenets envolve migra\u00e7\u00e3o sazonal com toda a estrutura de moradia, n\u00e3o apenas sa\u00eddas di\u00e1rias."}, {"text": "Porque utilizam tren\u00f3s para transportar mercadorias entre cidades vizinhas.", "isCorrect": false, "rationale": "A mudan\u00e7a de lugar est\u00e1 ligada \u00e0 sobreviv\u00eancia das renas e ao clima, n\u00e3o apenas ao com\u00e9rcio urbano."}], "hint": "Lembre-se da rela\u00e7\u00e3o de depend\u00eancia desse povo com as renas e o clima frio."}, {"question": "Os povos abor\u00edgines da Austr\u00e1lia s\u00e3o descritos como 'ca\u00e7adores-coletores'. O que isso significa sobre o modo de vida deles?", "answerOptions": [{"text": "Eles retiram seu alimento diretamente da natureza atrav\u00e9s da ca\u00e7a e da coleta de frutos e plantas.", "isCorrect": true, "rationale": "Essa denomina\u00e7\u00e3o refere-se a grupos que dependem dos recursos naturais dispon\u00edveis sem o uso de agricultura ou cria\u00e7\u00e3o em larga escala."}, {"text": "Eles criam animais em grandes cercados para garantir a alimenta\u00e7\u00e3o da tribo.", "isCorrect": false, "rationale": "A cria\u00e7\u00e3o de animais (pastoreio) \u00e9 uma caracter\u00edstica destacada nos Nenets, n\u00e3o no modo ca\u00e7ador-coletor abor\u00edgene."}, {"text": "Eles compram seus suprimentos em vilas pr\u00f3ximas \u00e0s suas terras.", "isCorrect": false, "rationale": "O material enfatiza o contato pr\u00f3ximo e direto com a natureza para a obten\u00e7\u00e3o de alimentos."}, {"text": "Eles plantam sementes e esperam a colheita para se alimentar.", "isCorrect": false, "rationale": "A coleta mencionada refere-se a plantas que j\u00e1 crescem naturalmente no ambiente."}], "hint": "Pense em como eles obt\u00eam comida sem praticar a agricultura ou o pastoreio."}, {"question": "Ao descrever a posi\u00e7\u00e3o de um objeto, qual par de refer\u00eancias espaciais \u00e9 utilizado para indicar o que est\u00e1 no interior ou no exterior de algo?", "answerOptions": [{"text": "Dentro e fora", "isCorrect": true, "rationale": "Este par descreve a rela\u00e7\u00e3o de um objeto com os limites internos ou externos de um recipiente ou espa\u00e7o."}, {"text": "Acima e abaixo", "isCorrect": false, "rationale": "Estas refer\u00eancias s\u00e3o usadas para indicar posi\u00e7\u00f5es verticais em rela\u00e7\u00e3o a um ponto de refer\u00eancia."}, {"text": "Esquerda e direita", "isCorrect": false, "rationale": "Estas refer\u00eancias s\u00e3o laterais e dependem da orienta\u00e7\u00e3o do corpo de quem observa."}, {"text": "Perto e longe", "isCorrect": false, "rationale": "Estes termos descrevem a dist\u00e2ncia entre dois pontos, n\u00e3o se algo est\u00e1 contido em outro objeto."}], "hint": "Imagine uma bola em rela\u00e7\u00e3o a uma caixa para escolher o par correto."}, {"question": "O que define o 'ponto de vista' de uma pessoa ao observar um lugar?", "answerOptions": [{"text": "\u00c9 o que a pessoa consegue ver a partir da posi\u00e7\u00e3o onde ela se encontra.", "isCorrect": true, "rationale": "O ponto de vista \u00e9 subjetivo e depende da localiza\u00e7\u00e3o f\u00edsica do observador no espa\u00e7o."}, {"text": "\u00c9 a representa\u00e7\u00e3o desenhada de um mapa a partir de fotografias a\u00e9reas.", "isCorrect": false, "rationale": "Embora o mapa use um ponto de vista (vis\u00e3o de cima), a defini\u00e7\u00e3o geral n\u00e3o se limita a desenhos."}, {"text": "\u00c9 a dist\u00e2ncia exata entre dois objetos medida em metros.", "isCorrect": false, "rationale": "A dist\u00e2ncia \u00e9 uma medida f\u00edsica, enquanto o ponto de vista \u00e9 a perspectiva visual de algu\u00e9m."}, {"text": "\u00c9 a capacidade de falar mais de um idioma em uma mesma cultura.", "isCorrect": false, "rationale": "Idiomas fazem parte da cultura, n\u00e3o t\u00eam rela\u00e7\u00e3o direta com a percep\u00e7\u00e3o visual do espa\u00e7o f\u00edsico."}], "hint": "Considere como a sua vis\u00e3o muda quando voc\u00ea se desloca de um lado da sala para o outro."}, {"question": "Qual tipo de representa\u00e7\u00e3o de lugar \u00e9 descrito como um modelo em tr\u00eas dimens\u00f5es?", "answerOptions": [{"text": "Maquete", "isCorrect": true, "rationale": "As maquetes s\u00e3o constru\u00e7\u00f5es f\u00edsicas que representam espa\u00e7os em escala reduzida, possuindo altura, largura e profundidade."}, {"text": "Mapa mental", "isCorrect": false, "rationale": "O mapa mental \u00e9 um esbo\u00e7o bidimensional que organiza ideias e conex\u00f5es espaciais, geralmente feito no papel."}, {"text": "Desenho", "isCorrect": false, "rationale": "Um desenho \u00e9 uma representa\u00e7\u00e3o em uma superf\u00edcie plana (2D), como uma folha de papel."}, {"text": "Mapa", "isCorrect": false, "rationale": "Mapas tradicionais s\u00e3o representa\u00e7\u00f5es planas que utilizam uma vis\u00e3o a\u00e9rea de cima para baixo."}], "hint": "Pense em uma representa\u00e7\u00e3o que voc\u00ea pode tocar e ver de v\u00e1rios \u00e2ngulos, como uma miniatura."}, {"question": "Os povos ind\u00edgenas do Brasil respeitam os ciclos de reprodu\u00e7\u00e3o dos peixes. Qual \u00e9 a principal consequ\u00eancia dessa atitude?", "answerOptions": [{"text": "Evita prejudicar a natureza e garante a exist\u00eancia de peixes no futuro.", "isCorrect": true, "rationale": "O respeito aos ciclos naturais \u00e9 uma pr\u00e1tica de sustentabilidade que permite a renova\u00e7\u00e3o dos recursos."}, {"text": "Permite que eles pesquem a mesma quantidade todos os dias do ano.", "isCorrect": false, "rationale": "Respeitar os ciclos significa pescar menos ou n\u00e3o pescar em certos per\u00edodos para proteger as esp\u00e9cies."}, {"text": "Garante que eles possam se mudar para a Sib\u00e9ria no inverno.", "isCorrect": false, "rationale": "A Sib\u00e9ria \u00e9 o habitat dos Nenets; os ind\u00edgenas brasileiros vivem em florestas tropicais."}, {"text": "Faz com que eles precisem usar tren\u00f3s para pescar em \u00e1guas congeladas.", "isCorrect": false, "rationale": "O uso de tren\u00f3s em gelo n\u00e3o faz parte da realidade dos rios e lagos brasileiros descritos no texto."}], "hint": "Pense em como o cuidado com o tempo da natureza ajuda a manter o equil\u00edbrio do ambiente."}, {"question": "Sobre a cultura dos Nenets, qual elemento \u00e9 utilizado como moradia que pode ser montada e desmontada?", "answerOptions": [{"text": "Chum", "isCorrect": true, "rationale": "O chum \u00e9 uma tenda tradicional adaptada ao estilo de vida n\u00f4made, permitindo mobilidade constante."}, {"text": "Canoa", "isCorrect": false, "rationale": "A canoa \u00e9 um meio de transporte aqu\u00e1tico, n\u00e3o uma habita\u00e7\u00e3o."}, {"text": "Oca", "isCorrect": false, "rationale": "Embora seja uma moradia ind\u00edgena, o texto n\u00e3o utiliza este termo para descrever as tendas dos Nenets."}, {"text": "Maquete", "isCorrect": false, "rationale": "Uma maquete \u00e9 apenas uma miniatura ou representa\u00e7\u00e3o de um lugar, n\u00e3o uma casa real."}], "hint": "Este termo espec\u00edfico denomina a tenda onde as fam\u00edlias Nenets vivem."}, {"question": "Qual \u00e9 a principal atividade econ\u00f4mica e de subsist\u00eancia comum a muitos grupos abor\u00edgines na Austr\u00e1lia?", "answerOptions": [{"text": "Ca\u00e7a e coleta", "isCorrect": true, "rationale": "Essas atividades definem o modo de vida tradicional abor\u00edgene em contato direto com a fauna e flora locais."}, {"text": "Pastoreio de renas", "isCorrect": false, "rationale": "O pastoreio de renas \u00e9 a atividade principal dos Nenets na Sib\u00e9ria, onde o clima permite a sobreviv\u00eancia desses animais."}, {"text": "Pesca com canoas em rios tropicais", "isCorrect": false, "rationale": "Esta atividade \u00e9 destacada como a principal dos povos ind\u00edgenas do Brasil."}, {"text": "Fabrica\u00e7\u00e3o industrial de ve\u00edculos", "isCorrect": false, "rationale": "O texto foca em costumes tradicionais e atividades ligadas \u00e0 natureza, n\u00e3o em ind\u00fastrias modernas."}], "hint": "Pense em atividades que envolvem buscar comida na natureza sem criar animais ou plantar."}];
var questions = [], cur = 0, answered = false, dots = [], scoreOk = 0;

function startGame(){
  questions = shuffle(RAW_QUESTIONS.slice());
  cur = 0; answered = false; scoreOk = 0;
  dots = questions.map(function(){ return 'pending'; });
  showScreen('screen-game');
  renderQ();
}

function renderQ(){
  var q = questions[cur];
  answered = false;
  $('progFill').style.width = Math.round(cur/questions.length*100) + '%';
  $('qNum').textContent = (cur+1) + ' / ' + questions.length;
  $('qText').textContent = q.question;
  var el = $('optsEl'); el.innerHTML = '';
  var opts = shuffle(q.answerOptions.slice());
  opts.forEach(function(o){
    var b = document.createElement('button');
    b.className = 'opt';
    b.textContent = o.text;
    b.addEventListener('click', function(){ pick(o); });
    el.appendChild(b);
  });
  $('hintBox').className = 'hint-box';
  $('btnNext').style.display = 'none';
  $('btnNext').textContent = cur < questions.length - 1 ? 'Pr\u00f3xima \u27a1' : '\ud83c\udfc1 Ver resultado';
  renderDots();
}

function pick(chosen){
  if(answered) return;
  answered = true;
  var q = questions[cur];
  var ok = chosen.isCorrect;
  if(ok) scoreOk++;
  dots[cur] = ok ? 'done' : 'fail';
  $('optsEl').querySelectorAll('.opt').forEach(function(b){
    var isCorrect = q.answerOptions.some(function(o){ return o.text === b.textContent && o.isCorrect; });
    if(isCorrect) b.classList.add('correct');
    else if(b.textContent === chosen.text && !ok) b.classList.add('wrong');
    else b.classList.add('disabled');
  });
  var hb = $('hintBox');
  if(ok){ hb.className = 'hint-box correct'; $('hintLabel').className = 'hint-label ok'; $('hintLabel').textContent = '\u2705 Certo!'; }
  else{ hb.className = 'hint-box wrong'; $('hintLabel').className = 'hint-label no'; $('hintLabel').textContent = '\u274c Quase!'; }
  var correctOpt = q.answerOptions.find(function(o){ return o.isCorrect; }) || {};
  $('hintDetail').textContent = chosen.rationale || correctOpt.rationale || '';
  $('btnNext').style.display = 'block';
  renderDots();
}

function nextQ(){
  cur++;
  if(cur >= questions.length) endScreen();
  else renderQ();
}

function renderDots(){
  var h = '';
  for(var i = 0; i < questions.length; i++){
    var c = 'q-dot';
    if(dots[i]==='done') c += ' done';
    else if(dots[i]==='fail') c += ' fail';
    else if(i===cur) c += ' cur';
    h += '<div class="' + c + '"></div>';
  }
  $('qDots').innerHTML = h;
}

function endScreen(){
  var pct = Math.round(scoreOk/questions.length*100);
  var em = pct===100 ? '\ud83c\udf1f' : pct>=70 ? '\ud83c\udfc6' : pct>=50 ? '\ud83d\udc4d' : '\ud83d\udcaa';
  var tit = pct===100 ? 'Perfeito!' : pct>=70 ? 'Muito bem!' : pct>=50 ? 'Bom trabalho!' : 'Continue praticando!';
  $('endEmoji').textContent = em;
  $('endTitle').textContent = tit;
  $('endScore').textContent = scoreOk + ' / ' + questions.length + ' (' + pct + '%)';
  $('endSub').textContent = 'Quer tentar de novo?';
  showScreen('screen-end');
}

initApp();
</script>
</body>
</html>
