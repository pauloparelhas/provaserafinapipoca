<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz: Periodos e Estacoes &mdash; Serafina</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../base.css">
<style>
.q-wrap{max-width:520px;margin:0 auto;}
.q-num{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;text-align:center;}
.q-text{font-size:calc(15px * var(--fs));font-weight:800;color:var(--text);line-height:1.5;margin-bottom:18px;text-align:center;padding:16px 12px;background:rgba(255,255,255,.04);border-radius:16px;border:1px solid rgba(255,255,255,.08);}
.opts{display:flex;flex-direction:column;gap:9px;margin-bottom:16px;}
.opt{padding:13px 16px;border-radius:14px;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);cursor:pointer;font-family:inherit;font-size:calc(14px * var(--fs));font-weight:700;color:var(--text);text-align:left;transition:all .18s;min-height:48px;-webkit-tap-highlight-color:transparent;}
.opt:hover{border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.08);transform:translateY(-1px);}
.opt.correct{border-color:#34d399;background:rgba(52,211,153,.12);color:#34d399;cursor:default;}
.opt.wrong{border-color:#ef4444;background:rgba(239,68,68,.1);color:#f87171;cursor:default;}
.opt.disabled{cursor:default;opacity:.55;}
.hint-box{border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:calc(12px * var(--fs));font-weight:700;display:none;}
.hint-box.correct{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--text);display:block;}
.hint-box.wrong{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);color:var(--text);display:block;}
.hint-label{font-weight:900;margin-bottom:3px;}
.hint-label.ok{color:#34d399;}
.hint-label.no{color:#f87171;}
.progress-bar{background:rgba(255,255,255,.07);border-radius:50px;height:6px;margin-bottom:16px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#34d399,#60a5fa);border-radius:50px;transition:width .4s;}
.btn-next{background:linear-gradient(135deg,#34d399,#60a5fa);color:#fff;border:none;font-family:inherit;font-size:15px;font-weight:800;padding:13px 32px;border-radius:50px;cursor:pointer;display:block;margin:0 auto;min-height:44px;transition:all .2s;}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(52,211,153,.3);}
.q-dots{display:flex;gap:5px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;}
.q-dot{width:9px;height:9px;border-radius:50%;background:var(--card-border);}
.q-dot.done{background:#34d399;}
.q-dot.fail{background:#ef4444;}
.q-dot.cur{background:#f59e0b;box-shadow:0 0 7px rgba(245,158,11,.5);}
.end-emoji{font-size:64px;text-align:center;display:block;margin:16px 0;filter:drop-shadow(0 0 16px rgba(52,211,153,.5));}
.end-score{text-align:center;font-size:calc(22px * var(--fs));font-weight:900;color:var(--text);margin-bottom:8px;}
.end-sub{text-align:center;font-size:14px;font-weight:700;color:var(--text-soft);margin-bottom:24px;}
.intro-emoji{font-size:64px;text-align:center;display:block;margin-bottom:14px;filter:drop-shadow(0 0 20px rgba(96,165,250,.5));animation:mfloat 3s ease-in-out infinite;}
.screen{max-width:540px;}
</style>
</head>
<body>
<canvas id="starfield"></canvas>
<div id="app">
<div class="navbar">
  <div class="nav-logo" id="navLogo">Serafina</div>
  <div class="nav-right">
    <button class="nav-btn nb-home" id="btnHome" onclick="showHomeModal()">&#x1F3E0;</button>
    <button class="nav-btn" id="btnRestart" onclick="startGame()">&#x21BA;</button>
    <div class="nav-a11y">
      <button class="nav-a11y-btn" id="btnFontDown" onclick="changeFontSize(-1)">A-</button>
      <button class="nav-a11y-btn" id="btnFontUp" onclick="changeFontSize(1)">A+</button>
      <button class="nav-a11y-btn" id="themeBtn" onclick="toggleTheme()">&#x2600;&#xFE0F;</button>
    </div>
  </div>
</div>

<div class="screen active" id="screen-intro">
  <div class="intro-emoji">&#x2753;</div>
  <div class="intro-title">Quiz: Periodos e Estacoes</div>
  <div class="intro-sub">GEO NB1 &bull; 10 perguntas</div>
  <div style="text-align:center;font-size:13px;font-weight:700;color:var(--text-dim);margin:12px 0 24px;">Gerado pelo NotebookLM com base nos insumos da aula</div>
  <button class="btn-start" onclick="startGame()">&#x1F4DA; Come&ccedil;ar!</button>
</div>

<div class="screen" id="screen-game">
  <div class="q-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    <div class="q-dots" id="qDots"></div>
    <div class="q-num" id="qNum">1 / 10</div>
    <div class="q-text" id="qText"></div>
    <div class="opts" id="optsEl"></div>
    <div class="hint-box" id="hintBox">
      <div class="hint-label" id="hintLabel"></div>
      <div id="hintDetail"></div>
    </div>
    <button class="btn-next" id="btnNext" style="display:none" onclick="nextQ()">Pr&oacute;xima &#x27A1;</button>
  </div>
</div>

<div class="screen" id="screen-end">
  <span class="end-emoji" id="endEmoji"></span>
  <div class="end-title" id="endTitle"></div>
  <div class="end-score" id="endScore"></div>
  <div class="end-sub" id="endSub"></div>
  <button class="btn-restart" onclick="startGame()">&#x1F500; Jogar de novo</button>
  <div style="text-align:center;margin-top:14px;">
    <button class="nav-btn" onclick="showHomeModal()" style="margin:0 auto;font-size:13px;padding:10px 20px;">&#x1F3E0; In&iacute;cio</button>
  </div>
</div>
</div>

<script src="../base.js"></script>
<script>
var RAW_QUESTIONS = [{"question": "De acordo com o material, quais s\u00e3o os tr\u00eas per\u00edodos em que o dia \u00e9 dividido para organizar a rotina?", "answerOptions": [{"text": "Manh\u00e3, tarde e noite", "isCorrect": true, "rationale": "Esses s\u00e3o os tr\u00eas intervalos de tempo citados como fundamentais para a organiza\u00e7\u00e3o das atividades e hor\u00e1rios das pessoas."}, {"text": "Nascer do sol, meio-dia e p\u00f4r do sol", "isCorrect": false, "rationale": "Embora marquem momentos espec\u00edficos, estes representam pontos de transi\u00e7\u00e3o e n\u00e3o os per\u00edodos completos de dura\u00e7\u00e3o das atividades."}, {"text": "Caf\u00e9 da manh\u00e3, almo\u00e7o e jantar", "isCorrect": false, "rationale": "Estes s\u00e3o nomes de refei\u00e7\u00f5es que ocorrem durante o dia, e n\u00e3o a divis\u00e3o dos per\u00edodos temporais em si."}, {"text": "Madrugada, manh\u00e3 e tarde", "isCorrect": false, "rationale": "A madrugada n\u00e3o \u00e9 destacada como um dos tr\u00eas per\u00edodos principais de atividades rotineiras descritos no texto base."}], "hint": "Pense nas tr\u00eas partes principais do dia que come\u00e7am quando acordamos e terminam quando vamos dormir."}, {"question": "Qual \u00e9 a principal caracter\u00edstica do per\u00edodo da manh\u00e3 descrita no texto?", "answerOptions": [{"text": "O sol nasce, ilumina a cidade e as pessoas acordam", "isCorrect": true, "rationale": "A manh\u00e3 \u00e9 marcada pelo in\u00edcio da claridade e pelo despertar das pessoas para suas tarefas iniciais."}, {"text": "O sol est\u00e1 no ponto mais alto do c\u00e9u e as ruas ficam calmas", "isCorrect": false, "rationale": "O sol alto caracteriza a tarde, e as ruas costumam ficar mais movimentadas, n\u00e3o calmas, na manh\u00e3."}, {"text": "O c\u00e9u fica escuro e as luzes da cidade se acendem", "isCorrect": false, "rationale": "Esta descri\u00e7\u00e3o refere-se ao per\u00edodo da noite, quando a ilumina\u00e7\u00e3o natural desaparece."}, {"text": "As pessoas come\u00e7am a se preparar para dormir e descansar", "isCorrect": false, "rationale": "O descanso e o sono s\u00e3o atividades t\u00edpicas do fim do dia, no per\u00edodo noturno."}], "hint": "Lembre-se do que acontece logo que o dia come\u00e7a a ficar claro."}, {"question": "Sobre o funcionamento dos espa\u00e7os p\u00fablicos, qual local funciona ininterruptamente (24 horas)?", "answerOptions": [{"text": "Hospital", "isCorrect": true, "rationale": "Hospitais precisam atender emerg\u00eancias a qualquer momento, funcionando tanto de dia quanto de noite."}, {"text": "Escola", "isCorrect": false, "rationale": "As escolas geralmente seguem hor\u00e1rios fixos nos per\u00edodos da manh\u00e3 e/ou tarde, fechando \u00e0 noite."}, {"text": "Com\u00e9rcio e lojas", "isCorrect": false, "rationale": "A maioria dos com\u00e9rcios encerra suas atividades ao final da tarde ou durante a noite, n\u00e3o operando 24 horas."}, {"text": "Parque de divers\u00f5es", "isCorrect": false, "rationale": "Parques costumam ter hor\u00e1rios de funcionamento restritos, baseados na luz do dia ou seguran\u00e7a noturna."}], "hint": "Pense em qual servi\u00e7o de sa\u00fade \u00e9 essencial estar sempre dispon\u00edvel para a popula\u00e7\u00e3o."}, {"question": "Como os dias e as noites se comportam durante a esta\u00e7\u00e3o do ver\u00e3o?", "answerOptions": [{"text": "Os dias s\u00e3o longos e as noites s\u00e3o curtas", "isCorrect": true, "rationale": "No ver\u00e3o, a inclina\u00e7\u00e3o da Terra permite mais tempo de exposi\u00e7\u00e3o solar, resultando em dias com maior dura\u00e7\u00e3o de claridade."}, {"text": "Os dias s\u00e3o curtos e as noites s\u00e3o longas", "isCorrect": false, "rationale": "Esta \u00e9 uma caracter\u00edstica do inverno, quando o per\u00edodo de luz solar \u00e9 reduzido."}, {"text": "Tanto o dia quanto a noite t\u00eam a mesma dura\u00e7\u00e3o exata", "isCorrect": false, "rationale": "A dura\u00e7\u00e3o varia conforme a esta\u00e7\u00e3o do ano devido \u00e0 inclina\u00e7\u00e3o do eixo terrestre."}, {"text": "N\u00e3o h\u00e1 luz solar e o c\u00e9u fica sempre nublado", "isCorrect": false, "rationale": "O ver\u00e3o \u00e9 conhecido justamente pelo excesso de sol e calor, n\u00e3o pela aus\u00eancia de luz."}], "hint": "Lembre-se de qual esta\u00e7\u00e3o tem mais tempo de sol para brincar ao ar livre."}, {"question": "Quais s\u00e3o os h\u00e1bitos alimentares e de vestu\u00e1rio comuns no inverno, segundo o material?", "answerOptions": [{"text": "Roupas pesadas e comidas quentes como sopas e ch\u00e1s", "isCorrect": true, "rationale": "O frio do inverno exige prote\u00e7\u00e3o corporal com casacos e alimentos que ajudem a manter a temperatura interna do corpo."}, {"text": "Roupas leves e bebidas muito geladas", "isCorrect": false, "rationale": "Roupas leves e gelados s\u00e3o adequados para o calor do ver\u00e3o, n\u00e3o para o frio intenso."}, {"text": "Apenas roupas de banho e frutas frescas", "isCorrect": false, "rationale": "Este conjunto de h\u00e1bitos est\u00e1 ligado a atividades de praia e calor extremo."}, {"text": "Roupas floridas e piqueniques ao ar livre", "isCorrect": false, "rationale": "Estas atividades s\u00e3o mais associadas \u00e0 primavera, quando o clima \u00e9 mais agrad\u00e1vel para estar fora de casa."}], "hint": "Considere o que fazemos para nos aquecer quando a temperatura est\u00e1 muito baixa."}, {"question": "O que acontece com a natureza durante a primavera?", "answerOptions": [{"text": "As flores voltam a brotar e os animais nascem", "isCorrect": true, "rationale": "A primavera \u00e9 o per\u00edodo de renascimento da flora e fauna ap\u00f3s o rigor do inverno."}, {"text": "As folhas das \u00e1rvores mudam de cor e caem no ch\u00e3o", "isCorrect": false, "rationale": "A queda das folhas \u00e9 a caracter\u00edstica marcante do outono, preparando a planta para o frio."}, {"text": "Toda a vegeta\u00e7\u00e3o seca por causa do calor forte", "isCorrect": false, "rationale": "O calor extremo pode ocorrer no ver\u00e3o, enquanto a primavera tem temperaturas que come\u00e7am a subir suavemente."}, {"text": "Aparece neve em quase todos os lugares do mundo", "isCorrect": false, "rationale": "A neve \u00e9 um fen\u00f4meno t\u00edpico de invernos rigorosos em certas regi\u00f5es, n\u00e3o da primavera."}], "hint": "Pense em qual esta\u00e7\u00e3o \u00e9 conhecida como a 'esta\u00e7\u00e3o das flores'."}, {"question": "Qual \u00e9 o principal motivo cient\u00edfico para a exist\u00eancia das quatro esta\u00e7\u00f5es do ano?", "answerOptions": [{"text": "A inclina\u00e7\u00e3o da Terra enquanto ela gira ao redor do Sol", "isCorrect": true, "rationale": "A inclina\u00e7\u00e3o do eixo terrestre faz com que diferentes partes do planeta recebam luz solar de forma desigual ao longo do ano."}, {"text": "A dist\u00e2ncia da Lua em rela\u00e7\u00e3o \u00e0 Terra", "isCorrect": false, "rationale": "A Lua influencia principalmente as mar\u00e9s e o per\u00edodo noturno, mas n\u00e3o as mudan\u00e7as clim\u00e1ticas sazonais."}, {"text": "A velocidade com que as nuvens se movem no c\u00e9u", "isCorrect": false, "rationale": "O movimento das nuvens afeta o tempo meteorol\u00f3gico di\u00e1rio, mas n\u00e3o define as esta\u00e7\u00f5es anuais."}, {"text": "O fato de o Sol girar em torno da Terra", "isCorrect": false, "rationale": "Este \u00e9 um conceito astron\u00f4mico incorreto; \u00e9 a Terra que orbita o Sol."}], "hint": "Reflita sobre como a posi\u00e7\u00e3o do nosso planeta em rela\u00e7\u00e3o \u00e0 sua estrela muda a recep\u00e7\u00e3o de luz."}, {"question": "No outono, como as pessoas geralmente se preparam para a chegada da pr\u00f3xima esta\u00e7\u00e3o?", "answerOptions": [{"text": "Come\u00e7am a usar roupas mais pesadas porque a temperatura diminui", "isCorrect": true, "rationale": "O outono \u00e9 uma transi\u00e7\u00e3o onde o calor diminui, exigindo roupas mais quentes em prepara\u00e7\u00e3o para o inverno."}, {"text": "Guardam todos os casacos e compram roupas de banho", "isCorrect": false, "rationale": "Isso ocorreria na transi\u00e7\u00e3o para o ver\u00e3o, e n\u00e3o quando a temperatura est\u00e1 caindo."}, {"text": "Passam a usar protetor solar constantemente para o frio", "isCorrect": false, "rationale": "O protetor solar \u00e9 mais enfatizado no ver\u00e3o devido ao sol forte, embora o frio do outono exija outros cuidados."}, {"text": "Ficam apenas dentro de casa sem realizar atividades", "isCorrect": false, "rationale": "As pessoas continuam ativas, mas mudam o tipo de roupa e se adaptam \u00e0 mudan\u00e7a na paisagem (folhas ca\u00eddas)."}], "hint": "Pense no que acontece com a temperatura logo ap\u00f3s o fim do ver\u00e3o."}, {"question": "Qual atividade \u00e9 citada como comum no per\u00edodo da noite para a maioria das pessoas?", "answerOptions": [{"text": "Jantar, descansar e dormir", "isCorrect": true, "rationale": "O per\u00edodo noturno \u00e9 o momento em que o corpo recupera as energias ap\u00f3s as atividades do dia."}, {"text": "Ir para a escola e praticar esportes ao ar livre", "isCorrect": false, "rationale": "Estudos e esportes ao ar livre s\u00e3o atividades predominantemente diurnas (manh\u00e3 e tarde)."}, {"text": "Tomar o caf\u00e9 da manh\u00e3 e ver o sol nascer", "isCorrect": false, "rationale": "Estas s\u00e3o a\u00e7\u00f5es que marcam o in\u00edcio da manh\u00e3, o oposto do per\u00edodo noturno."}, {"text": "Ir \u00e0 praia e tomar sorvete no sol", "isCorrect": false, "rationale": "Estas atividades dependem do sol e do calor, sendo t\u00edpicas de tardes de ver\u00e3o."}], "hint": "Pense no que sua fam\u00edlia faz quando o c\u00e9u fica escuro e as luzes da rua se acendem."}, {"question": "Por que o hor\u00e1rio e as atividades mudam em diferentes lugares do mundo ao mesmo tempo?", "answerOptions": [{"text": "Porque lugares diferentes vivem esta\u00e7\u00f5es e per\u00edodos diferentes simultaneamente", "isCorrect": true, "rationale": "Devido \u00e0 inclina\u00e7\u00e3o e rota\u00e7\u00e3o da Terra, enquanto \u00e9 dia em um lugar, pode ser noite em outro, ou ver\u00e3o em um hemisf\u00e9rio e inverno no outro."}, {"text": "Porque cada cidade escolhe sua pr\u00f3pria esta\u00e7\u00e3o do ano", "isCorrect": false, "rationale": "As esta\u00e7\u00f5es s\u00e3o fen\u00f4menos naturais globais e n\u00e3o uma escolha administrativa das cidades."}, {"text": "Porque o Sol nasce ao mesmo tempo em todos os pa\u00edses", "isCorrect": false, "rationale": "O Sol nasce em hor\u00e1rios diferentes ao redor do globo devido ao formato esf\u00e9rico e rota\u00e7\u00e3o da Terra."}, {"text": "Porque as pessoas preferem trabalhar apenas no ver\u00e3o", "isCorrect": false, "rationale": "O trabalho e os servi\u00e7os ocorrem o ano todo, adaptando-se \u00e0s condi\u00e7\u00f5es clim\u00e1ticas de cada esta\u00e7\u00e3o."}], "hint": "Considere como a Terra se posiciona no espa\u00e7o em rela\u00e7\u00e3o ao Sol."}];
var questions = [], cur = 0, answered = false, dots = [], scoreOk = 0;

function startGame(){
  questions = shuffle(RAW_QUESTIONS.slice());
  cur = 0; answered = false; scoreOk = 0;
  dots = questions.map(function(){ return 'pending'; });
  showScreen('screen-game');
  renderQ();
}

function renderQ(){
  var q = questions[cur];
  answered = false;
  $('progFill').style.width = Math.round(cur/questions.length*100) + '%';
  $('qNum').textContent = (cur+1) + ' / ' + questions.length;
  $('qText').textContent = q.question;
  var el = $('optsEl'); el.innerHTML = '';
  var opts = shuffle(q.answerOptions.slice());
  opts.forEach(function(o){
    var b = document.createElement('button');
    b.className = 'opt';
    b.textContent = o.text;
    b.addEventListener('click', function(){ pick(o); });
    el.appendChild(b);
  });
  $('hintBox').className = 'hint-box';
  $('btnNext').style.display = 'none';
  $('btnNext').textContent = cur < questions.length - 1 ? 'Pr\u00f3xima \u27a1' : '\ud83c\udfc1 Ver resultado';
  renderDots();
}

function pick(chosen){
  if(answered) return;
  answered = true;
  var q = questions[cur];
  var ok = chosen.isCorrect;
  if(ok) scoreOk++;
  dots[cur] = ok ? 'done' : 'fail';
  $('optsEl').querySelectorAll('.opt').forEach(function(b){
    var isCorrect = q.answerOptions.some(function(o){ return o.text === b.textContent && o.isCorrect; });
    if(isCorrect) b.classList.add('correct');
    else if(b.textContent === chosen.text && !ok) b.classList.add('wrong');
    else b.classList.add('disabled');
  });
  var hb = $('hintBox');
  if(ok){ hb.className = 'hint-box correct'; $('hintLabel').className = 'hint-label ok'; $('hintLabel').textContent = '\u2705 Certo!'; }
  else{ hb.className = 'hint-box wrong'; $('hintLabel').className = 'hint-label no'; $('hintLabel').textContent = '\u274c Quase!'; }
  var correctOpt = q.answerOptions.find(function(o){ return o.isCorrect; }) || {};
  $('hintDetail').textContent = chosen.rationale || correctOpt.rationale || '';
  $('btnNext').style.display = 'block';
  renderDots();
}

function nextQ(){
  cur++;
  if(cur >= questions.length) endScreen();
  else renderQ();
}

function renderDots(){
  var h = '';
  for(var i = 0; i < questions.length; i++){
    var c = 'q-dot';
    if(dots[i]==='done') c += ' done';
    else if(dots[i]==='fail') c += ' fail';
    else if(i===cur) c += ' cur';
    h += '<div class="' + c + '"></div>';
  }
  $('qDots').innerHTML = h;
}

function endScreen(){
  var pct = Math.round(scoreOk/questions.length*100);
  var em = pct===100 ? '\ud83c\udf1f' : pct>=70 ? '\ud83c\udfc6' : pct>=50 ? '\ud83d\udc4d' : '\ud83d\udcaa';
  var tit = pct===100 ? 'Perfeito!' : pct>=70 ? 'Muito bem!' : pct>=50 ? 'Bom trabalho!' : 'Continue praticando!';
  $('endEmoji').textContent = em;
  $('endTitle').textContent = tit;
  $('endScore').textContent = scoreOk + ' / ' + questions.length + ' (' + pct + '%)';
  $('endSub').textContent = 'Quer tentar de novo?';
  showScreen('screen-end');
}

initApp();
</script>
</body>
</html>
